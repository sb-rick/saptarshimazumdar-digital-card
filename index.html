<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saptarshi Mazumdar | Advocate</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 20%, #1e293b, #020617);
      overflow: hidden;
    }

    .card {
      position: relative;
      width: 380px;
      height: 720px;
      border-radius: 30px;
      padding: 28px 24px;
      backdrop-filter: blur(30px);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 50px 120px rgba(0,0,0,0.9);
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
      transform: rotate(25deg);
      animation: shine 6s infinite linear;
    }

    @keyframes shine {
      0% { transform: translateX(-100%) rotate(25deg); }
      100% { transform: translateX(100%) rotate(25deg); }
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      margin: 10px auto;
      border: 3px solid gold;
      position: relative;
      z-index: 2;
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    h1 {
      text-align: center;
      font-family: 'Playfair Display', serif;
      color: #fff;
      margin-top: 10px;
      position: relative;
      z-index: 2;
    }

    .subtitle, .court {
      text-align: center;
      color: #fde047;
      font-size: 14px;
      position: relative;
      z-index: 2;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 16px;
      margin-top: 20px;
      position: relative;
      z-index: 2;
    }

    .btn {
      height: 64px;
      border-radius: 18px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.25s ease;
      cursor: pointer;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(253,224,71,0.6);
    }

    svg { width: 26px; height: 26px; }

    .qr {
      margin-top: 16px;
      padding: 10px;
      border-radius: 16px;
      background: rgba(255,255,255,0.1);
      border: 1px dashed rgba(255,255,255,0.4);
      text-align: center;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .qr.active {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .save {
      margin-top: 12px;
      display: block;
      text-align: center;
      padding: 10px;
      border-radius: 14px;
      background: gold;
      color: black;
      text-decoration: none;
      font-weight: 600;
      position: relative;
      z-index: 2;
    }

  </style>
</head>
<body>

<div class="card">

  <div class="avatar"><img src="avatar2.jpg"></div>

  <h1>Saptarshi Mazumdar</h1>
  <div class="subtitle">Advocate</div>
  <div class="court">Calcutta High Court · Room No. 104</div>

  <!-- QR Hidden Initially -->

  <a class="save" href="contact.vcf" download>Save Contact</a>

</div>

<script>

  const qr = document.getElementById('qrBox');
  qr.classList.toggle('active');
}
</script>

</body>
</html>
